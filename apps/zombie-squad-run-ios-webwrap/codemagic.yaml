workflows:
  zombie-squad-run-ios:
    name: Zombie Squad Run iOS
    max_build_duration: 60
    environment:
      xcode: latest
      cocoapods: default
      node: 20
    scripts:
      - name: Install npm dependencies
        script: |
          cd apps/zombie-squad-run-ios-webwrap
          npm install
      - name: Apply final app config
        script: |
          cd apps/zombie-squad-run-ios-webwrap
          if [ -f .env ]; then npm run apply:env-config; else echo ".env not present, skipping local app-id stamp"; fi
      - name: Stamp support and privacy URLs if configured
        script: |
          cd apps/zombie-squad-run-ios-webwrap
          if [ -n "$PAGES_BASE_URL" ] || { [ -n "$GITHUB_OWNER" ] && [ -n "$GITHUB_REPO" ]; }; then npm run set:pages-urls; else echo "Pages URL stamping skipped"; fi
      - name: Prepare web assets
        script: |
          cd apps/zombie-squad-run-ios-webwrap
          npm run release:prep
          npm run check:assets
      - name: Add iOS platform if needed
        script: |
          cd apps/zombie-squad-run-ios-webwrap
          npx cap add ios || true
      - name: Sync Capacitor
        script: |
          cd apps/zombie-squad-run-ios-webwrap
          npx cap sync ios
      - name: Build iOS app
        script: |
          echo "Open the generated iOS project settings in Codemagic and configure signing for final archive/export."
    artifacts:
      - apps/zombie-squad-run-ios-webwrap/release/**
    publishing:
      email:
        recipients:
          - you@example.com
