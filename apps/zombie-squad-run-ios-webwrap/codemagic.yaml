workflows:
  zombie-squad-run-ios:
    name: Zombie Squad Run iOS
    max_build_duration: 90
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      cocoapods: default
      node: 20
      vars:
        XCODE_WORKSPACE: apps/zombie-squad-run-ios-webwrap/ios/App/App.xcworkspace
        XCODE_SCHEME: App
        APP_STORE_APPLE_ID: ""
    scripts:
      - name: Install npm dependencies
        script: |
          cd apps/zombie-squad-run-ios-webwrap
          npm install
      - name: Validate required environment variables
        script: |
          test -n "$APP_ID" || (echo "APP_ID is required" && exit 1)
          test -n "$APP_NAME" || (echo "APP_NAME is required" && exit 1)
          test -n "$APPLE_TEAM_ID" || (echo "APPLE_TEAM_ID is required" && exit 1)
      - name: Materialize .env from Codemagic secrets
        script: |
          cd apps/zombie-squad-run-ios-webwrap
          cat > .env <<EOF
          APP_ID=$APP_ID
          APP_NAME=$APP_NAME
          APPLE_TEAM_ID=$APPLE_TEAM_ID
          APP_STORE_CONNECT_ISSUER_ID=$APP_STORE_CONNECT_ISSUER_ID
          APP_STORE_CONNECT_KEY_ID=$APP_STORE_CONNECT_KEY_ID
          APP_STORE_CONNECT_PRIVATE_KEY_BASE64=$APP_STORE_CONNECT_PRIVATE_KEY_BASE64
          PAGES_BASE_URL=$PAGES_BASE_URL
          GITHUB_OWNER=$GITHUB_OWNER
          GITHUB_REPO=$GITHUB_REPO
          EOF
      - name: Finalize release assets and metadata
        script: |
          cd apps/zombie-squad-run-ios-webwrap
          npm run finalize:release
          npm run generate:submission-packet
      - name: Add iOS platform if needed
        script: |
          cd apps/zombie-squad-run-ios-webwrap
          npx cap add ios || true
      - name: Sync Capacitor iOS project
        script: |
          cd apps/zombie-squad-run-ios-webwrap
          npx cap sync ios
      - name: Install CocoaPods dependencies
        script: |
          cd apps/zombie-squad-run-ios-webwrap/ios/App
          pod install
      - name: Set up App Store Connect API key for publishing
        script: |
          mkdir -p "$HOME/private_keys"
          if [ -n "$APP_STORE_CONNECT_PRIVATE_KEY_BASE64" ] && [ -n "$APP_STORE_CONNECT_KEY_ID" ]; then
            echo "$APP_STORE_CONNECT_PRIVATE_KEY_BASE64" | base64 --decode > "$HOME/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"
          else
            echo "App Store Connect API key not fully configured, skipping key materialization"
          fi
      - name: Apply signing profiles
        script: |
          xcode-project use-profiles
      - name: Build signed IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - apps/zombie-squad-run-ios-webwrap/build/ios/ipa/*.ipa
      - apps/zombie-squad-run-ios-webwrap/build/ios/archive/*.xcarchive
      - apps/zombie-squad-run-ios-webwrap/release/**
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY_BASE64
        key_id: $APP_STORE_CONNECT_KEY_ID
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
      email:
        recipients:
          - you@example.com
