name: publish-hosted-pages

on:
  workflow_dispatch:
  push:
    paths:
      - 'apps/zombie-squad-run/release/SUPPORT.md'
      - 'apps/zombie-squad-run/release/PRIVACY.md'
      - 'apps/zombie-squad-run-ios-webwrap/tools/build-hosted-pages.js'
      - 'apps/zombie-squad-run-ios-webwrap/release/HOSTED_PAGES_QUICKSTART.md'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/zombie-squad-run-ios-webwrap
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build hosted pages
        run: npm run build:hosted-pages

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/zombie-squad-run-ios-webwrap/release/hosted-pages

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
